<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Gestión de Contactos</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <!-- CSS -->
    <link rel="stylesheet" href="assets/css/styles.css">

    <!-- Favicon -->
    <link rel="icon" href="assets/img/favicon.ico">

</head>

<body>

    <!-- NAVBAR -->

    <nav class="navbar navbar-dark bg-dark shadow">

        <div class="container">

            <a href="#" class="navbar-brand fw-bold">
                Gestión de Contactos
            </a>

        </div>

    </nav>
    <!-- LOADER -->

    <div id="loader" class="loader-container">

        <div class="spinner-border text-primary"></div>

    </div>

    <!-- CONTENIDO -->

    <div class="container mt-5">

        <div class="d-flex justify-content-between align-items-center mb-4">

            <h2 class="fw-bold">
                Lista de Contactos
            </h2>

            <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#modalAgregar">

                <i class="bi bi-plus-circle"></i>
                Agregar

            </button>

        </div>
        <div class="row mb-4">

            <div class="col-md-4">

                <input type="text" class="form-control" id="buscador" placeholder="Buscar contacto...">

            </div>

        </div>

        <!-- TABLA -->

        <div class="table-responsive shadow rounded">

            <table class="table table-hover text-center align-middle">

                <thead class="table-dark">

                    <tr>
                        <th>ID</th>
                        <th>Nombre</th>
                        <th>Apellido</th>
                        <th>Categoría</th>
                        <th>Tipo</th>
                        <th>Valor</th>
                        <th>Acciones</th>
                    </tr>

                </thead>

                <tbody id="tablaContactos">

                </tbody>

            </table>

        </div>

    </div>

    <!-- MODAL AGREGAR -->

    <div class="modal fade" id="modalAgregar">

        <div class="modal-dialog modal-lg modal-dialog-centered">

            <div class="modal-content">

                <div class="modal-header bg-primary text-white">

                    <h5 class="modal-title">
                        Agregar Contacto
                    </h5>

                    <button class="btn-close btn-close-white" data-bs-dismiss="modal">
                    </button>

                </div>

                <div class="modal-body">

                    <form id="formAgregar">

                        <div class="row">

                            <div class="col-md-6 mb-3">

                                <label class="form-label">
                                    Nombre
                                </label>

                                <input type="text" class="form-control" id="nombre">

                            </div>

                            <div class="col-md-6 mb-3">

                                <label class="form-label">
                                    Apellido
                                </label>

                                <input type="text" class="form-control" id="apellido">

                            </div>

                            <div class="col-md-6 mb-3">

                                <label class="form-label">
                                    Fecha Nacimiento
                                </label>

                                <input type="date" class="form-control" id="fecha_nacimiento">

                            </div>

                            <div class="col-md-6 mb-3">

                                <label class="form-label">
                                    Categoría
                                </label>

                                <select class="form-select" id="id_categoria">

                                    <option value="1">
                                        Familia Cercana
                                    </option>
                                
                                    <option value="2">
                                        Trabajo
                                    </option>
                                
                                    <option value="3">
                                        Escuela
                                    </option>
                                
                                    <option value="4">
                                        Amigos
                                    </option>
                                
                                    <option value="5">
                                        cuates
                                    </option>
                                
                                    <option value="6">
                                        Clientes
                                    </option>
                                
                                </select>

                            </div>

                            <div class="col-md-6 mb-3">

                                <label class="form-label">
                                    Teléfono
                                </label>

                                <input type="text" class="form-control" id="telefono">

                            </div>

                            <div class="col-md-6 mb-3">

                                <label class="form-label">
                                    Correo
                                </label>

                                <input type="email" class="form-control" id="correo">

                            </div>

                        </div>

                    </form>

                </div>

                <div class="modal-footer">

                    <button class="btn btn-secondary" data-bs-dismiss="modal">

                        Cancelar

                    </button>

                    <button class="btn btn-primary" id="btnGuardar">

                        Guardar

                    </button>

                </div>

            </div>


        </div>

    </div>
    <!-- MODAL EDITAR -->

    <!-- MODAL EDITAR -->

    <div class="modal fade" id="modalEditar">

        <div class="modal-dialog modal-lg modal-dialog-centered">

            <div class="modal-content">

                <div class="modal-header bg-warning">

                    <h5 class="modal-title">

                        Actualizar Contacto

                    </h5>

                    <button class="btn-close" data-bs-dismiss="modal">
                    </button>

                </div>

                <div class="modal-body">

                    <form id="formEditar">

                        <input type="hidden" id="edit_id_contacto">

                        <div class="row">

                            <div class="col-md-6 mb-3">

                                <label class="form-label">

                                    Nombre

                                </label>

                                <input type="text" class="form-control" id="edit_nombre">

                            </div>

                            <div class="col-md-6 mb-3">

                                <label class="form-label">

                                    Apellido

                                </label>

                                <input type="text" class="form-control" id="edit_apellido">

                            </div>

                            <div class="col-md-6 mb-3">

                                <label class="form-label">

                                    Fecha Nacimiento

                                </label>

                                <input type="date" class="form-control" id="edit_fecha">

                            </div>

                            <div class="col-md-6 mb-3">

                                <label class="form-label">

                                    Categoría

                                </label>

                                <select class="form-select" id="edit_categoria">

                                    <option value="1">
                                        Familia Cercana
                                    </option>
                                
                                    <option value="2">
                                        Trabajo
                                    </option>
                                
                                    <option value="3">
                                        Escuela
                                    </option>
                                
                                    <option value="4">
                                        Amigos
                                    </option>
                                
                                    <option value="5">
                                        cuates
                                    </option>
                                
                                    <option value="6">
                                        Clientes
                                    </option>
                                
                                </select>

                            </div>

                        </div>

                    </form>

                </div>

                <div class="modal-footer">

                    <button class="btn btn-secondary" data-bs-dismiss="modal">

                        Cancelar

                    </button>

                    <button class="btn btn-warning" id="btnActualizar">

                        Actualizar

                    </button>

                </div>

            </div>

        </div>

    </div>

    <!-- FOOTER -->

    <footer class="bg-dark text-white text-center p-3 mt-5">

        Desarrollado por Marco Lara

    </footer>

    <!-- Bootstrap JS -->

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <!-- SweetAlert -->

    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <!-- JS -->

    <script type="module" src="assets/js/app.js"></script>

</body>

</html>
